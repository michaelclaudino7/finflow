name: checkpoint_finflow
config_version: 1.0
class_name: SimpleCheckpoint
run_name_template: "%Y%m%d-%H%M%S-finflow"

validations:
  - batch_request:
      datasource_name: finflow_postgres
      data_connector_name: default_inferred_data_connector_name
      data_asset_name: raw.precos_acoes
    expectation_suite_name: suite_precos_acoes
    action_list:
      - name: store_validation_result
        action:
          class_name: StoreValidationResultAction
      - name: update_data_docs
        action:
          class_name: UpdateDataDocsAction
          site_names: [local_site]

  - batch_request:
      datasource_name: finflow_postgres
      data_connector_name: default_inferred_data_connector_name
      data_asset_name: raw.indicadores_macro
    expectation_suite_name: suite_indicadores_macro
    action_list:
      - name: store_validation_result
        action:
          class_name: StoreValidationResultAction
      - name: update_data_docs
        action:
          class_name: UpdateDataDocsAction
          site_names: [local_site]
