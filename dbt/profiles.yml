finflow:
  target: dev
  outputs:
    dev:
      type:     postgres
      host:     "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port:     "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user:     "{{ env_var('POSTGRES_USER', 'finflow') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'finflow123') }}"
      dbname:   "{{ env_var('POSTGRES_DB', 'finflow') }}"
      schema:   public
      threads:  4

    prod:
      type:     postgres
      host:     "{{ env_var('POSTGRES_HOST') }}"
      port:     "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user:     "{{ env_var('POSTGRES_USER') }}"
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      dbname:   "{{ env_var('POSTGRES_DB') }}"
      schema:   public
      threads:  8
