name: "finflow"
version: "1.0.0"
config-version: 2

profile: "finflow"

model-paths:    ["models"]
analysis-paths: ["analyses"]
test-paths:     ["tests"]
seed-paths:     ["seeds"]
macro-paths:    ["macros"]
snapshot-paths: ["snapshots"]

target-path:  "target"
clean-targets: ["target", "dbt_packages"]

models:
  finflow:
    staging:
      +schema:       staging
      +materialized: view
      +tags:         ["staging"]

    intermediate:
      +schema:       intermediate
      +materialized: ephemeral
      +tags:         ["intermediate"]

    marts:
      +schema:       marts
      +materialized: table
      +tags:         ["marts"]
      +post-hook:    "ANALYZE {{ this }}"

vars:
  # Janelas de cálculo
  janela_volatilidade: 21   # dias úteis (~1 mês)
  janela_beta:         252  # dias úteis (~1 ano)
  ticker_benchmark:    "^BVSP"
